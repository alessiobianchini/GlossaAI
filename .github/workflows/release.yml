name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Release Standalone
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: GlossaAI-Setup-win-x64.exe
          - os: ubuntu-latest
            rid: linux-x64
            archive: GlossaAI-linux-x64.tar.gz
          - os: macos-latest
            rid: osx-x64
            archive: GlossaAI-osx-x64.dmg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish standalone application
        run: dotnet publish src/GlossaAI.Desktop/GlossaAI.Desktop.csproj -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishSingleFile=true /p:ReadyToRun=true -o ./publish/${{ matrix.rid }}

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Copy FFmpeg to publish directory (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ffmpegPath = (Get-Command ffmpeg).Source
          Copy-Item -Path $ffmpegPath -Destination ./publish/win-x64/

      - name: Copy FFmpeg to publish directory (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          FFMPEG_PATH=$(which ffmpeg)
          cp $FFMPEG_PATH ./publish/osx-x64/

      - name: Copy FFmpeg to publish directory (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          FFMPEG_PATH=$(which ffmpeg)
          cp $FFMPEG_PATH ./publish/linux-x64/

      # Windows installer packaging
      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y

      - name: Create Inno Setup Script
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $issContent = @"
          [Setup]
          AppName=GlossaAI
          AppVersion=1.0.0
          DefaultDirName={autopf}\GlossaAI
          DefaultGroupName=GlossaAI
          OutputDir=.
          OutputBaseFilename=GlossaAI-Setup-win-x64
          Compression=lzma
          SolidCompression=yes
          PrivilegesRequired=admin
          
          [Files]
          Source: "publish\win-x64\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          
          [Icons]
          Name: "{group}\GlossaAI"; Filename: "{app}\GlossaAI.Desktop.exe"
          Name: "{autodesktop}\GlossaAI"; Filename: "{app}\GlossaAI.Desktop.exe"; Tasks: desktopicon
          
          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"
          
          [Run]
          Filename: "{app}\GlossaAI.Desktop.exe"; Description: "{cm:LaunchProgram,GlossaAI}"; Flags: nowait postinstall skipifsilent
          "@
          Set-Content -Path setup.iss -Value $issContent

      - name: Build Installer (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      # macOS bundle & DMG packaging
      - name: Create App Bundle & DMG (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "=== Starting macOS packaging debug ===" > build.log
          {
            echo "--- System Info ---"
            uname -a
            sw_vers
            
            echo "--- Directory contents of publish/osx-x64 ---"
            ls -la ./publish/osx-x64
            
            echo "--- Creating App Bundle structure ---"
            mkdir -p GlossaAI.app/Contents/MacOS
            mkdir -p GlossaAI.app/Contents/Resources
            
            echo "--- Copying published files ---"
            cp -R ./publish/osx-x64/. GlossaAI.app/Contents/MacOS/
            
            echo "--- Listing files in GlossaAI.app/Contents/MacOS ---"
            ls -la GlossaAI.app/Contents/MacOS
            
            echo "--- Finding GlossaAI executable files ---"
            find GlossaAI.app -name "GlossaAI*"
            
            echo "--- Applying executable permissions ---"
            chmod +x GlossaAI.app/Contents/MacOS/GlossaAI.Desktop
            chmod +x GlossaAI.app/Contents/MacOS/ffmpeg
            
            echo "--- Copying Info.plist ---"
            cp src/GlossaAI.Desktop/Info.plist GlossaAI.app/Contents/Info.plist
            
            echo "--- Verifying Info.plist exists ---"
            ls -l GlossaAI.app/Contents/Info.plist
            
            echo "--- Running hdiutil create ---"
            sync
            hdiutil create -volname "GlossaAI Installer" -srcfolder GlossaAI.app -ov -format UDZO GlossaAI-osx-x64.dmg
          } >> build.log 2>&1 || {
            echo "=== BUILD FAILED ===" >> build.log
            cat build.log
            exit 1
          }
          echo "=== BUILD SUCCEEDED ===" >> build.log
          cat build.log

      - name: Upload Logs on Failure
        if: failure() && matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: build.log


      # Linux archive packaging
      - name: Compress Build Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: tar -czf GlossaAI-linux-x64.tar.gz -C ./publish/linux-x64 .

      - name: Deploy Release Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
