name: GlossaAI
options:
  bundleIdPrefix: com.alessiobianchini
  deploymentTarget:
    iOS: 17.0
  developmentLanguage: en
packages:
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "3.0.0"
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: "0.1.24"
targets:
  GlossaAI:
    type: application
    platform: iOS
    deploymentTarget: 17.0
    sources: [Sources/GlossaAI]
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: 5.0
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        VERSIONING_SYSTEM: apple-generic
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: "match AppStore it.alessiobianchini.glossaai"
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: SK68SF94T9
        PRODUCT_BUNDLE_IDENTIFIER: it.alessiobianchini.glossaai
    dependencies:
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXRandom
      - package: SwiftTransformers
        product: HuggingFace
      - package: SwiftTransformers
        product: Tokenizers
